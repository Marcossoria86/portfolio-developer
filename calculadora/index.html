<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora iOS Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
  </head>
  <body>
    <!-- Capas de luces de fondo para lograr el efecto vidrio real de iOS -->
    <div class="blob-gradient blob-1"></div>
    <div class="blob-gradient blob-2"></div>

    <button id="theme-toggle" class="theme-btn">🌙 Modo Oscuro</button>

    <h1>Calculadora</h1>

    <div class="cuadricula">
      <div class="display-container">
        <input type="text" placeholder="0" id="display" readonly />
        <button id="copy-btn" title="Copiar resultado">📋</button>
      </div>
      <button id="pow">^</button>
      <button id="open-parenthesis">(</button>
      <button id="close-parenthesis">)</button>
      <button id="percent">%</button>

      <button id="clear">AC</button>
      <button id="backspace">⌫</button>
      <button id="divide">÷</button>
      <button id="multiply">×</button>

      <button id="seven">7</button>
      <button id="eight">8</button>
      <button id="nine">9</button>
      <button id="subtract">-</button>

      <button id="four">4</button>
      <button id="five">5</button>
      <button id="six">6</button>
      <button id="add">+</button>

      <button id="one">1</button>
      <button id="two">2</button>
      <button id="three">3</button>
      <button id="equals">=</button>

      <button id="zero">0</button>
      <button id="decimal">.</button>
    </div>

    <h2>Historial</h2>
    <div
      style="
        display: flex;
        gap: 10px;
        justify-content: center;
        width: 350px;
        margin: 16px auto 0;
      "
    >
      <button
        id="clear-history"
        style="
          height: 36px;
          font-size: 13px;
          border-radius: 12px;
          cursor: pointer;
        "
      >
        Borrar historial
      </button>
      <button
        id="export-history"
        style="
          height: 36px;
          font-size: 13px;
          border-radius: 12px;
          background-color: #4f46e5;
          color: white;
          cursor: pointer;
        "
      >
        📥 Exportar .TXT
      </button>
    </div>
    <ul id="history"></ul>

    <script src="script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sopa de Letras</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <script>
      // Aplicamos el modo oscuro ANTES de pintar la página, para que no haya
      // un parpadeo de claro->oscuro al cargar.
      if (localStorage.getItem("sopa_modo_oscuro") === "1") {
        document.documentElement.dataset.modo = "oscuro";
      }
    </script>
    <!-- El botón de modo oscuro y el de ajustes viven acá en el arranque;
         el script.js mueve la barra dentro del header de cada pantalla
         (inicio, juego o editor) para que nunca quede tapando nada. -->
    <div class="barra-flotante" id="barra-flotante">
      <button id="btn-ajustes" class="btn-flotante" title="Ajustes"></button>
      <button id="btn-oscuro" class="btn-flotante" title="Modo oscuro"></button>
    </div>
    <div id="panel-ajustes" class="panel-ajustes" hidden>
      <div class="fila-ajuste">
        <label id="label-ajuste-idioma" for="select-idioma">Idioma</label>
        <select id="select-idioma"></select>
      </div>
      <div class="fila-ajuste">
        <label id="label-ajuste-tipografia" for="select-tipografia"
          >Tipografía</label
        >
        <select id="select-tipografia">
          <option id="opt-tipo-sistema" value="sistema">Predeterminada</option>
          <option id="opt-tipo-serif" value="serif">Serif</option>
          <option id="opt-tipo-mono" value="mono">Monoespaciada</option>
          <option id="opt-tipo-redondeada" value="redondeada">
            Redondeada
          </option>
        </select>
      </div>
      <div class="fila-ajuste fila-switch">
        <label id="label-ajuste-negrita" for="chk-negrita">Negrita</label>
        <input type="checkbox" id="chk-negrita" />
      </div>
      <div class="fila-ajuste fila-switch">
        <label id="label-ajuste-adblock" for="chk-adblock"
          >Bloqueador de anuncios
          <span id="etiqueta-proximamente" class="etiqueta-proximamente"
            >(próximamente)</span
          ></label
        >
        <input type="checkbox" id="chk-adblock" />
      </div>
    </div>
    <canvas
      id="lienzo-confeti"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 999;
      "
    ></canvas>
    <!-- Pantalla de Selección de Temas (Inspirada en Apple Arcade) -->
    <div id="pantalla-inicio" class="contenedor-apple">
      <div class="cabecera-inicio">
        <h1 id="titulo-inicio">Sopa de Letras</h1>
        <div id="anchor-inicio" class="anchor-flotante"></div>
      </div>
      <p id="subtitulo-inicio" class="subtitulo">
        Selecciona una categoría de juego
      </p>
      <div class="grid-categorias">
        <button class="tarjeta-categoria" data-tema="web">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6L3 12L8 18M16 6L21 12L16 18" /></svg>
          </div>
          <h3>Desarrollo Web</h3>
          <p>Frontend, Frameworks y navegadores</p>
        </button>
        <button class="tarjeta-categoria" data-tema="datos">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5.5" rx="7" ry="2.7" /><path d="M5 5.5V18.5A7 2.7 0 0 0 19 18.5V5.5" /><path d="M5 12A7 2.7 0 0 0 19 12" /></svg>
          </div>
          <h3>Bases de Datos</h3>
          <p>SQL, almacenamiento y servidores</p>
        </button>
        <button class="tarjeta-categoria" data-tema="seguridad">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3.2v5.3c0 4.7-3 8.2-7 9.5-4-1.3-7-4.8-7-9.5V6.2L12 3z" /><path d="M9 12l2 2 4-4.2" /></svg>
          </div>
          <h3>Seguridad</h3>
          <p>Cifrado, tokens y protocolos web</p>
        </button>
        <button class="tarjeta-categoria" data-tema="ia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="1.2" /><path d="M9 7V3M12 7V3M15 7V3M9 21v-4M12 21v-4M15 21v-4M7 9H3M7 12H3M7 15H3M21 9h-4M21 12h-4M21 15h-4" /></svg>
          </div>
          <h3>Inteligencia Artificial</h3>
          <p>Algoritmos, modelos y machine learning</p>
        </button>
        <button class="tarjeta-categoria" data-tema="cloud">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6.8 19a4.3 4.3 0 0 1 0-8.6 5.7 5.7 0 0 1 11-1.7A4.3 4.3 0 0 1 17.5 19H6.8z" /></svg>
          </div>
          <h3>Cloud &amp; DevOps</h3>
          <p>Contenedores, despliegues e infraestructura</p>
        </button>
        <button class="tarjeta-categoria" data-tema="diseno">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20l1-4L15 6l3 3L8 19l-4 1z" /><path d="M13 8l3 3" /><circle cx="18.2" cy="5.8" r="1.6" /></svg>
          </div>
          <h3>Diseño UI/UX</h3>
          <p>Interfaces, usabilidad y herramientas de diseño</p>
        </button>
        <button class="tarjeta-categoria" data-tema="historia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9.5L12 4l8 5.5" /><path d="M4 9.5h16" /><path d="M6 9.5V19M10 9.5V19M14 9.5V19M18 9.5V19" /><path d="M3 20h18" /></svg>
          </div>
          <h3>Historia</h3>
          <p>Civilizaciones, imperios y grandes eventos</p>
        </button>
        <button class="tarjeta-categoria" data-tema="astronomia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.5" /><ellipse cx="12" cy="12" rx="10" ry="3.2" transform="rotate(-24 12 12)" /></svg>
          </div>
          <h3>Astronomía</h3>
          <p>Planetas, estrellas y el universo</p>
        </button>
        <button class="tarjeta-categoria" data-tema="arte">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="17" r="2.5" /><path d="M10 17V4l7 2.4V11" /><path d="M10 8.5L17 11" /></svg>
          </div>
          <h3>Arte y Cultura</h3>
          <p>Pintura, música, cine y literatura</p>
        </button>
        <button class="tarjeta-categoria" data-tema="geografia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9" /><ellipse cx="12" cy="12" rx="4" ry="9" /><path d="M3 12h18" /></svg>
          </div>
          <h3>Geografía</h3>
          <p>Países, montañas, ríos y océanos</p>
        </button>
        <button class="tarjeta-categoria" data-tema="ciencia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2.5v6.2L4.6 18a2 2 0 0 0 1.8 3h11.2a2 2 0 0 0 1.8-3l-4.9-9.3V2.5" /><path d="M9 2.5h6" /><path d="M7.2 15h9.6" /></svg>
          </div>
          <h3>Ciencia y Naturaleza</h3>
          <p>Biología, física y el mundo natural</p>
        </button>
        <button class="tarjeta-categoria" data-tema="mitologia">
          <div class="icono-cat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4.5 13.5H10L9 21.5L18.5 9.5H13L13 2z" /></svg>
          </div>
          <h3>Mitología</h3>
          <p>Dioses, héroes y leyendas antiguas</p>
        </button>
      </div>
      <div id="grid-personalizadas" class="grid-categorias grid-personalizadas"></div>
      <button id="btn-abrir-editor" class="tarjeta-categoria tarjeta-agregar">
        <div class="icono-cat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14" /></svg>
        </div>
        <h3 id="titulo-crear-cat">Crear categoría</h3>
        <p id="desc-crear-cat">Agregá tus propios temas y palabras</p>
      </button>
      <div class="seccion-records">
        <h3 id="titulo-records">🏆 Mejores Tiempos</h3>
        <ul id="lista-records"></ul>
      </div>
    </div>
    <!-- Pantalla del Editor de Categorías -->
    <div id="pantalla-editor" class="contenedor-apple contenedor-editor" style="display: none">
      <div class="cabecera-inicio">
        <h1 id="titulo-editor">Crear categoría</h1>
        <div id="anchor-editor" class="anchor-flotante"></div>
      </div>
      <p id="desc-editor" class="subtitulo">
        Elegí un nombre, un ícono y las palabras que quieras. No hace falta
        que tengan el mismo largo, el juego las acomoda solo.
      </p>
      <label id="label-nombre-cat" class="etiqueta-campo" for="input-nombre-cat">Nombre de la categoría</label>
      <input
        type="text"
        id="input-nombre-cat"
        class="campo-editor"
        maxlength="30"
        placeholder="Ej: Deportes, Cocina, Series..."
      />
      <label id="label-icono-cat" class="etiqueta-campo" for="input-icono-cat">Ícono (un emoji, opcional)</label>
      <input
        type="text"
        id="input-icono-cat"
        class="campo-editor"
        maxlength="4"
        placeholder="⚽"
      />
      <label id="label-palabras-cat" class="etiqueta-campo" for="input-palabras-cat"
        >Palabras (una por línea o separadas por coma)</label
      >
      <textarea
        id="input-palabras-cat"
        class="campo-editor area-editor"
        rows="8"
        placeholder="FUTBOL, BASQUET, TENIS, NATACION, MARATON..."
      ></textarea>
      <p id="msg-editor" class="msg-editor"></p>
      <div class="botones-editor">
        <button id="btn-guardar-cat" class="btn-primario">Guardar categoría</button>
        <button id="btn-cancelar-editor" class="btn-secundario">Cancelar</button>
      </div>
    </div>
    <!-- Pantalla del Juego Real -->
    <div id="pantalla-juego" class="contenedor-principal" style="display: none">
      <div class="panel-lateral">
        <div class="cabecera-juego">
          <div class="titulo-bloque">
            <span class="marca-juego">Sopa de Letras</span>
            <h2 id="titulo-categoria">Categoría</h2>
          </div>
          <div class="estado-inline">
            <span id="tiempo-reloj" class="cronometro">00:00</span>
            <span id="num-progreso" class="contador-texto">0/0</span>
          </div>
          <div id="anchor-juego" class="anchor-flotante"></div>
        </div>
        <div class="seccion-estado">
          <div class="barra-contenedor">
            <div id="barra-progreso"></div>
          </div>
        </div>
        <div id="contenedor-palabras"></div>
        <div class="botones-control">
          <button id="btn-pista" class="btn-secundario">💡 Pista</button>
          <button id="btn-volver" class="btn-rojo">Menu</button>
        </div>
      </div>
      <div class="panel-tablero">
        <div class="contenedor-tablero-relativo">
          <div id="capa-resaltadores"></div>
          <div id="tablero-sopa"></div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
